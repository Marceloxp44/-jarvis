<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Chat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Courier New, monospace;
}

body{
    background:#111;
    color:#00ff00;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat{
    width:95%;
    max-width:500px;
    height:90vh;
    border:3px solid #00ff00;
    display:flex;
    flex-direction:column;
    background:#000;
}

.topo{
    padding:15px;
    border-bottom:2px solid #00ff00;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.mensagens{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg{
    margin:8px 0;
    padding:10px;
    border:1px solid #00ff00;
    width:fit-content;
    max-width:80%;
    word-wrap:break-word;
}

.eu{
    margin-left:auto;
    background:#003300;
}

.outro{
    background:#111;
}

.input-area{
    display:flex;
    border-top:2px solid #00ff00;
}

input{
    flex:1;
    padding:15px;
    background:#000;
    color:#00ff00;
    border:none;
    outline:none;
}

button{
    width:80px;
    border:none;
    background:#00ff00;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="chat">
    <div class="topo">
        RETRO CHAT
    </div>

    <div class="mensagens" id="mensagens">
        <div class="msg outro">Bem-vindo ao Retro Chat!</div>
    </div>

    <div class="input-area">
        <input type="text" id="texto" placeholder="Digite...">
        <button onclick="enviar()">Enviar</button>
    </div>
</div>

<script>
function enviar() {
    let texto = document.getElementById('texto');

    if(texto.value.trim() === '') return;

    let mensagens = document.getElementById('mensagens');

    mensagens.innerHTML += `
        <div class="msg eu">${texto.value}</div>
    `;

    let resposta = [
        "Olá!",
        "Como você está?",
        "Legal 😎",
        "Mensagem recebida.",
        "Retro Chat online."
    ];

    setTimeout(() => {
        mensagens.innerHTML += `
            <div class="msg outro">
                ${resposta[Math.floor(Math.random()*resposta.length)]}
            </div>
        `;
        mensagens.scrollTop = mensagens.scrollHeight;
    }, 1000);

    texto.value = "";
    mensagens.scrollTop = mensagens.scrollHeight;
}
</script>

</body>
</html>
